[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "blender-engine"
version = "0.1.0"
description = "BlenderAgentBot core engine - 26 tools + Blender Addon + transport layer"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[tool.hatch.build.targets.wheel]
packages = ["."]
