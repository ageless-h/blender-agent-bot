[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "blender-engine"
version = "0.1.0"
description = "BlenderAgentBot core engine - 26 capabilities + Blender Addon + transport layer"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "blender-shared",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[tool.hatch.build.targets.wheel]
packages = ["blender_engine"]
