[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "blender-frontend-mcp"
version = "0.1.0"
description = "BlenderAgentBot MCP protocol frontend - IDE/MCP client interface"
requires-python = ">=3.11"
dependencies = [
    "blender-engine",
]

[project.scripts]
blender-mcp = "blender_mcp_frontend.mcp_server:run_mcp_server"

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "ruff"]

[tool.hatch.build.targets.wheel]
packages = ["blender_mcp_frontend"]
