metadata:
  name: simple_chair
  tags: [furniture, chair, seat]
  description: 创建带靠背的简易椅子
  author: BlenderAgentBot Builtin Team
  version: "1.0.0"
  success_rate: 0.92
  usage_count: 0
  undo_rate: 0.0
  partial_undo_stats:
    structure: 0.0
    proportion: 0.0
    material: 0.0

gene:
  strategy: |
    1. 先搭建坐垫与靠背
    2. 再创建四条椅腿稳定支撑
    3. 最后统一材质并检查比例
  parameters:
    seat_width:
      type: float
      default: 0.55
      range: [0.4, 0.9]
    seat_depth:
      type: float
      default: 0.5
      range: [0.35, 0.8]
    seat_height:
      type: float
      default: 0.45
      range: [0.3, 0.7]
    back_height:
      type: float
      default: 0.5
      range: [0.3, 0.9]
    back_offset_y:
      type: float
      default: -0.5
      range: [-1.2, -0.2]
    back_center_z:
      type: float
      default: 0.9
      range: [0.5, 1.6]
  constraints:
    - back_height 应至少是 seat_height 的 0.6 倍
    - seat_depth 不应小于 seat_width 的 0.6 倍
    - back_center_z 应大于 seat_height

capsule:
  steps:
    - tool: create_object
      args: {name: ChairSeat, object_type: MESH, primitive: cube}
      undo_group: structure
    - tool: modify_object
      args:
        name: ChairSeat
        scale: ["$seat_width", "$seat_depth", 0.06]
        location: [0.0, 0.0, "$seat_height"]
      undo_group: structure
    - tool: create_object
      args: {name: ChairBack, object_type: MESH, primitive: cube}
      undo_group: structure
    - tool: modify_object
      args:
        name: ChairBack
        scale: ["$seat_width", 0.05, "$back_height"]
        location: [0.0, "$back_offset_y", "$back_center_z"]
      undo_group: proportion
    - tool: create_object
      args: {name: ChairLeg_FL, object_type: MESH, primitive: cube}
      undo_group: structure
    - tool: modify_object
      args:
        name: ChairLeg_FL
        scale: [0.04, 0.04, "$seat_height"]
        location: ["$seat_width", "$seat_depth", "$seat_height"]
        duplicate_to:
          - {name: ChairLeg_FR, location: ["$seat_width", "-$seat_depth", "$seat_height"]}
          - {name: ChairLeg_BL, location: ["-$seat_width", "$seat_depth", "$seat_height"]}
          - {name: ChairLeg_BR, location: ["-$seat_width", "-$seat_depth", "$seat_height"]}
      undo_group: proportion
    - tool: manage_material
      args:
        action: assign
        object_names: [ChairSeat, ChairBack, ChairLeg_FL, ChairLeg_FR, ChairLeg_BL, ChairLeg_BR]
        material_name: Mat_Chair_Default
      undo_group: material

validation:
  - object_exists: [ChairSeat, ChairBack, ChairLeg_FL, ChairLeg_FR, ChairLeg_BL, ChairLeg_BR]
  - object_count_gte: 6
  - material_exists: [Mat_Chair_Default]
